bind r
bind r source-file ~/.tmux.conf

# Unbind default prefix
unbind C-b

# Set new prefix
set -g prefix C-a
bind C-a send-prefix

#set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'

set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
# ...alongside
set -g @plugin 'tmux-plugins/tpm'

set -g @catppuccin_flavor 'latte' # latte, frappe, macchiato or mocha


# ~/.tmux.conf

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux
# Or, if using TPM, just run TPM

# ── Popup windows ──
set -g popup-style 'bg=default'
set -g popup-border-style 'fg=default'

# Scratchpad popup (prefix + n to toggle)
bind n if-shell -F '#{==:#{session_name},scratch}' { detach-client } { display-popup -E -b none -w 90% -h 85% "tmux new-session -A -s scratch 'nvim /tmp/scratch.md'" }

# Dev server popup (prefix + v to toggle, per-directory session)
bind v if-shell -F '#{m:dev-*,#{session_name}}' { detach-client } { display-popup -E -b none -d '#{pane_current_path}' -w 90% -h 85% ~/.tmux/scripts/dev-popup.sh }

# Shell popup at home directory (prefix + g to toggle)
bind g if-shell -F '#{==:#{session_name},home}' { detach-client } { display-popup -E -b none -d '~' -w 90% -h 85% "tmux new-session -A -s home -c ~" }

